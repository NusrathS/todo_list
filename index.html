<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Glassmorphism TO-DO List App</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">

    </head>
    <body>
        <div class="container">
            <div class="todo-app">
                <h1>To-Do-App</h1>
                <div class="stat-container">
                    <div class="details">
                        <h3>Keep it Up!</h3>
                            <div class="progressbar" id="progressbar">
                                <div class="progess" id="progress"></div>
                            </div>
                    </div>
                    <div class="stats-number">
                        <p class="numbers">0 / 0</p>
                    </div>
                </div>
                <form class="input-area">
                    <input type="text" id="task-input" placeholder="Add a new task....">
                    <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
                </form>
                <div class="todos-container">
                    <ul id="task-list">
                    </ul>
                    <img class="empty-image" src="./images/empty.jpg" alt="empty">
                </div>
            </div>
        </div>
    </body>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</html>
